<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0f1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workout" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>" />
  <title>Workout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700;9..40,800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0f1a; --bgR: #111827; --bgI: #0d1322;
      --srf: rgba(17,24,39,0.96); --bdr: rgba(148,163,184,0.1); --bdrF: rgba(99,220,255,0.45);
      --t1: #f1f5f9; --t2: #94a3b8; --t3: #64748b;
      --ac: #63dcff; --acB: rgba(99,220,255,0.12);
      --gn: #4ade80; --gnB: rgba(74,222,128,0.10);
      --am: #fbbf24; --amB: rgba(251,191,36,0.10);
      --rd: #fb7185;
      --R: 16px; --Rs: 12px; --Rx: 8px;
      --f: 'DM Sans',system-ui,-apple-system,sans-serif;
      --m: 'JetBrains Mono',ui-monospace,monospace;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{height:100%}
    body{font-family:var(--f);background:var(--bg);color:var(--t1);min-height:100%;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;padding-top:env(safe-area-inset-top,0px)}
    button{font:inherit;border:none;cursor:pointer;color:inherit;background:none}
    input,select,textarea{font:inherit;-webkit-appearance:none;appearance:none}

    .app{max-width:480px;margin:0 auto;padding:0 12px}

    /* Gate */
    .gate{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);padding:32px;text-align:center}
    .gate h1{font-size:36px;font-weight:800;background:linear-gradient(135deg,var(--ac),var(--gn));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .gate p{color:var(--t2);margin:6px 0 28px;font-size:15px}
    .gate-bs{display:grid;gap:12px;width:100%;max-width:300px}
    .gate-b{padding:22px 16px;border-radius:var(--R);text-align:center;background:var(--bgR);border:1px solid var(--bdr);transition:transform .12s}
    .gate-b:active{transform:scale(.97)}
    .gate-b strong{display:block;font-size:18px;margin-bottom:2px}
    .gate-b span{font-size:13px;color:var(--t2)}
    .gate.hidden{display:none}

    /* Header */
    .hdr{position:sticky;top:0;z-index:30;background:rgba(10,15,26,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr);padding:12px 16px 10px}
    .hdr-r{display:flex;justify-content:space-between;align-items:center}
    .hdr-t{font-size:20px;font-weight:800;letter-spacing:-.02em}
    .hdr-s{font-size:12px;color:var(--t3);margin-top:1px}
    .hdr-bg{font-family:var(--m);font-size:11px;font-weight:600;padding:5px 10px;border-radius:999px;background:var(--acB);color:var(--ac);white-space:nowrap}
    .wk-r{display:flex;align-items:center;gap:8px;margin-top:10px}
    .wk-s{display:flex;align-items:center;background:var(--bgR);border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
    .wk-s button{width:36px;height:36px;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--t2)}
    .wk-s button:active{background:rgba(255,255,255,.05)}
    .wk-v{font-family:var(--m);font-size:13px;font-weight:600;padding:0 6px;min-width:48px;text-align:center}
    .chip{height:36px;padding:0 12px;border-radius:10px;font-size:12px;font-weight:700;background:var(--bgR);border:1px solid var(--bdr);color:var(--t2);display:flex;align-items:center;justify-content:center;white-space:nowrap}
    .chip:active{background:rgba(255,255,255,.06)}

    /* Tabs */
    .tabs{display:flex;gap:4px;padding:10px 0 6px;position:sticky;top:82px;z-index:25;background:rgba(10,15,26,.94);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
    .tab{flex:1;padding:10px 0;border-radius:10px;text-align:center;font-size:13px;font-weight:700;color:var(--t3);border:1px solid transparent;transition:all .12s}
    .tab.on{color:var(--t1);background:var(--acB);border-color:rgba(99,220,255,.2)}
    .tab:active{transform:scale(.97)}

    /* Cards */
    .card{background:var(--srf);border:1px solid var(--bdr);border-radius:var(--R);padding:16px;margin-bottom:10px}
    .card-h{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
    .card-h h2{font-size:16px;font-weight:700}
    .hint{font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.06em}

    /* Workout grid */
    .wo-g{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
    .wo-b{padding:12px;border-radius:var(--Rs);text-align:left;background:rgba(255,255,255,.02);border:1px solid var(--bdr);transition:all .12s}
    .wo-b.on{background:var(--acB);border-color:rgba(99,220,255,.35)}
    .wo-b:active{transform:scale(.97)}
    .wo-b strong{display:block;font-size:13px}
    .wo-b span{font-size:11px;color:var(--t3)}

    /* Stats */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
    .st{padding:10px 8px;border-radius:var(--Rs);text-align:center;background:rgba(255,255,255,.02);border:1px solid var(--bdr)}
    .st strong{display:block;font-family:var(--m);font-size:18px;font-weight:700}
    .st span{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.04em}

    /* Metrics */
    .met{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .mf label{display:block;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-weight:600}
    .mf input,.sel{width:100%;padding:10px 8px;text-align:center;background:var(--bgI);border:1px solid var(--bdr);border-radius:var(--Rx);color:var(--t1);font-size:15px;outline:none}
    .sel{text-align:left;padding:10px 12px;font-size:14px}
    .mf input:focus,.sel:focus{border-color:var(--bdrF);box-shadow:0 0 0 2px rgba(99,220,255,.08)}

    /* Exercise */
    .ex{border-radius:var(--R);margin-bottom:12px;border:1px solid var(--bdr);overflow:hidden;background:linear-gradient(180deg,rgba(17,24,39,.98),rgba(13,19,34,.96))}
    .ex-top{padding:14px 14px 10px}
    .ex-nm{font-size:17px;font-weight:800;letter-spacing:-.01em}
    .ex-bd{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
    .bd{font-size:11px;font-weight:600;padding:4px 8px;border-radius:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:var(--t2);white-space:nowrap}
    .bd-ok{background:var(--gnB);border-color:rgba(74,222,128,.2);color:var(--gn)}
    .ex-nt{font-size:12px;color:var(--t3);margin-top:6px}
    .ex-sb{margin:0 14px 8px;padding:8px 10px;background:var(--bgI);border:1px solid var(--bdr);border-radius:var(--Rx);color:var(--t1);font-size:13px;width:calc(100% - 28px);outline:none}
    .ex-sb:focus{border-color:var(--bdrF)}
    .ex-hi{margin:0 14px 10px;padding:10px 12px;border-radius:var(--Rx);background:rgba(99,220,255,.05);border:1px solid rgba(99,220,255,.12);font-size:12px;color:#b8e8f8}
    .ex-hi strong{color:var(--ac)}
    .ex-spark{margin-top:8px;display:flex;align-items:center;gap:8px}
    .ex-spark svg{flex-shrink:0}
    .ex-spark span{font-size:10px;color:var(--t3);white-space:nowrap}
    .spark-up{color:var(--gn)}
    .spark-dn{color:var(--rd)}
    .ex-tl{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:0 14px 10px}
    .tb{padding:10px 6px;border-radius:var(--Rx);text-align:center;font-size:12px;font-weight:700;color:var(--t2);background:rgba(255,255,255,.03);border:1px solid var(--bdr)}
    .tb:active{background:rgba(255,255,255,.07)}
    .tb-t{color:var(--am);background:var(--amB);border-color:rgba(251,191,36,.15)}

    /* Sets */
    .sets{padding:0 10px 12px}
    .sr{display:grid;grid-template-columns:40px 1fr 1fr 1fr;gap:6px;align-items:end;padding:8px 6px;margin-bottom:6px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.03);border-radius:var(--Rs);transition:background .2s,border-color .2s}
    .sr.dn{background:rgba(74,222,128,.06);border-color:rgba(74,222,128,.15)}
    .sn{width:40px;height:48px;display:flex;align-items:center;justify-content:center;font-family:var(--m);font-size:14px;font-weight:700;color:var(--t3);background:rgba(255,255,255,.03);border-radius:var(--Rx)}
    .sr.dn .sn{color:var(--gn)}
    .sf label{display:block;font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;font-weight:600}
    .sf input{width:100%;height:48px;padding:6px 4px;text-align:center;background:var(--bgI);border:1px solid var(--bdr);border-radius:var(--Rx);color:var(--t1);font-family:var(--m);font-size:16px;font-weight:600;outline:none}
    .sf input:focus{border-color:var(--bdrF);box-shadow:0 0 0 2px rgba(99,220,255,.08)}
    .sf input::placeholder{color:var(--t3);font-size:12px;font-family:var(--f);font-weight:400}

    /* Actions */
    .notes{width:100%;min-height:80px;padding:12px;background:var(--bgI);border:1px solid var(--bdr);border-radius:var(--Rs);color:var(--t1);font-size:14px;resize:vertical;outline:none}
    .notes:focus{border-color:var(--bdrF)}
    .acts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
    .bp{padding:16px;border-radius:var(--Rs);font-weight:800;font-size:15px;background:linear-gradient(135deg,var(--ac),var(--gn));color:#04131c;text-align:center;box-shadow:0 4px 20px rgba(99,220,255,.15)}
    .bp:active{transform:scale(.98);opacity:.9}
    .bg{padding:16px;border-radius:var(--Rs);font-weight:700;font-size:14px;background:rgba(255,255,255,.03);border:1px solid var(--bdr);color:var(--t2);text-align:center}
    .bg:active{background:rgba(255,255,255,.06)}
    .bg.red{color:var(--rd)}

    /* Banners */
    .bn{padding:10px 14px;border-radius:var(--Rs);font-size:13px;margin-bottom:10px}
    .bn-w{background:var(--amB);border:1px solid rgba(251,191,36,.2);color:#fde68a}
    .bn-i{background:var(--gnB);border:1px solid rgba(74,222,128,.18);color:#bbf7d0}

    /* History */
    .hi{padding:12px;border-radius:var(--Rs);background:rgba(255,255,255,.02);border:1px solid var(--bdr);margin-bottom:8px}
    .hi-tp{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
    .hi-n{font-size:15px;font-weight:700}
    .hi-v{font-family:var(--m);font-size:13px;font-weight:600;color:var(--gn)}
    .hi-m{font-size:12px;color:var(--t3);margin-top:3px}
    .hi-s{font-size:13px;margin-top:6px;color:var(--t2)}

    /* Ref */
    .ri{padding:12px;border-radius:var(--Rs);background:rgba(255,255,255,.02);border:1px solid var(--bdr);margin-bottom:8px;font-size:14px;line-height:1.5}

    /* Timer */
    .tmr{position:fixed;left:8px;right:8px;z-index:50;bottom:calc(8px + env(safe-area-inset-bottom,0px));padding:14px 16px 12px;background:rgba(10,15,26,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--bdr);border-radius:var(--R);box-shadow:0 -4px 32px rgba(0,0,0,.4);display:none}
    .tmr.show{display:block}
    .tmr-r{display:flex;justify-content:space-between;align-items:center}
    .tmr-l{font-size:12px;color:var(--t3)}
    .tmr-t{font-family:var(--m);font-size:32px;font-weight:700;color:var(--ac);letter-spacing:-.02em}
    .tmr-a{display:flex;gap:6px}
    .tmr-a button{padding:8px 14px;border-radius:var(--Rx);font-size:13px;font-weight:700;background:rgba(255,255,255,.06);border:1px solid var(--bdr);color:var(--t2)}
    .tmr-a button:active{background:rgba(255,255,255,.1)}
    .tmr-tk{height:4px;border-radius:999px;background:rgba(255,255,255,.06);margin-top:10px;overflow:hidden}
    .tmr-fl{height:100%;width:0%;background:linear-gradient(90deg,var(--ac),var(--gn));border-radius:999px;transition:width .3s linear}

    /* Toast */
    .toast{position:fixed;top:calc(12px + env(safe-area-inset-top,0px));left:50%;transform:translate(-50%,-10px);opacity:0;pointer-events:none;background:rgba(10,15,26,.96);color:var(--t1);border:1px solid var(--bdr);border-radius:999px;padding:10px 16px;font-size:13px;font-weight:700;z-index:60;backdrop-filter:blur(12px);transition:all .2s}
    .toast.show{opacity:1;transform:translate(-50%,0)}

    .spacer{height:calc(80px + env(safe-area-inset-bottom,0px))}
    .mb8{margin-bottom:8px} .mb12{margin-bottom:12px}
    .lbl{display:block;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600}
    .hidden{display:none!important}
    @media(max-width:374px){.stats{grid-template-columns:repeat(2,1fr)}.met{grid-template-columns:repeat(2,1fr)}.ex-tl{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
<div id="gate" class="gate hidden">
  <h1>Workout</h1>
  <p>Who's training today?</p>
  <div class="gate-bs">
    <button class="gate-b" data-pf="dad"><strong>Upper / Lower</strong><span>12-week hypertrophy</span></button>
    <button class="gate-b" data-pf="daughter"><strong>Glute Split</strong><span>Glute / Pull / Legs / Push</span></button>
  </div>
</div>
<div id="toast" class="toast"></div>
<div class="app">
  <div class="hdr">
    <div class="hdr-r"><div><div class="hdr-t" id="hT">Workout</div><div class="hdr-s" id="hS"></div></div><div class="hdr-bg" id="hB">W1</div></div>
    <div class="wk-r">
      <div class="wk-s"><button id="wD">−</button><div class="wk-v" id="wV">W1</div><button id="wU">+</button></div>
      <button class="chip" id="aBtn">Auto</button>
      <button class="chip" id="tBtn">Today</button>
      <div style="flex:1"></div>
      <button class="chip" id="pBtn" title="Switch profile">⇄</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" data-tab="today">Today</button>
    <button class="tab" data-tab="history">History</button>
    <button class="tab" data-tab="reference">Ref</button>
    <button class="tab" data-tab="settings">Settings</button>
  </div>
  <main id="C"></main>
</div>
<div id="tmr" class="tmr">
  <div class="tmr-r"><div><div class="tmr-l" id="tL">Rest</div><div class="tmr-t" id="tT">0:00</div></div>
    <div class="tmr-a"><button id="t+">+30s</button><button id="tP">Pause</button><button id="tX">✕</button></div>
  </div>
  <div class="tmr-tk"><div class="tmr-fl" id="tF"></div></div>
</div>
<script>
// ═══ Service Worker (offline) ═══
if('serviceWorker' in navigator){const c=`const C='wv5-1';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.add(self.registration.scope)).then(()=>self.skipWaiting()))});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim()))});self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(fetch(e.request).then(r=>{const cl=r.clone();caches.open(C).then(c=>c.put(e.request,cl));return r}).catch(()=>caches.match(e.request)))})`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([c],{type:'application/javascript'}))).catch(()=>{});}

// ═══ PROGRAMS ═══
const PROGRAMS={
upperLower12:{key:'upperLower12',title:'12-Week Upper / Lower Hypertrophy',shortName:'Upper / Lower',profileHint:'dad',deloadWeek:7,
schedule:{1:'Upper A',2:'Lower A',4:'Upper B',5:'Lower B'},
workouts:{
upperA:{key:'upperA',dayNumber:1,day:'Monday',name:'Upper A',focus:'Horizontal push / pull',exercises:[
{name:'Barbell Bench Press',sets:4,repsMin:5,repsMax:8,rirTarget:2,rest:180,note:'Main press. Add reps before load.',type:'compound',region:'upper',step:5},
{name:'Chest-Supported Row',sets:4,repsMin:6,repsMax:8,rirTarget:2,rest:180,type:'compound',region:'upper',step:5},
{name:'Incline DB Press',sets:3,repsMin:8,repsMax:10,rirTarget:3,rest:120,type:'compound',region:'upper',step:5},
{name:'Lat Pulldown (V-bar)',sets:3,repsMin:8,repsMax:10,rirTarget:3,rest:120,type:'compound',region:'upper',step:5},
{name:'Face Pulls',sets:2,repsMin:12,repsMax:15,rirTarget:3,rest:90,type:'accessory',region:'upper',step:2.5},

{name:'Hack Squat / Leg Press Variant',sets:3,repsMin:8,repsMax:10,rirTarget:3,rest:150,type:'compound',region:'lower',step:10},
{name:'Leg Extension',sets:3,repsMin:10,repsMax:12,rirTarget:3,rest:90,type:'accessory',region:'lower',step:5},

{name:'Weighted Pull-up / Lat Pulldown',sets:4,repsMin:6,repsMax:8,rirTarget:2,rest:180,type:'compound',region:'upper',step:5},
{name:'Machine Chest Press',sets:3,repsMin:8,repsMax:10,rirTarget:3,rest:120,type:'compound',region:'upper',step:5},
{name:'Seated Cable Row',sets:3,repsMin:8,repsMax:10,rirTarget:3,rest:120,type:'compound',region:'upper',step:5},
{name:'Lateral Raise',sets:2,repsMin:12,repsMax:15,rirTarget:3,rest:90,type:'accessory',region:'upper',step:2.5},
{name:'Triceps Pushdown',sets:2,repsMin:10,repsMax:12,rirTarget:3,rest:90,type:'accessory',region:'upper',step:2.5}]},
lowerB:{key:'lowerB',dayNumber:5,day:'Friday',name:'Lower B',focus:'Posterior chain',exercises:[
{name:'Romanian Deadlift',sets:3,repsMin:8,repsMax:10,rirTarget:2,rest:180,type:'compound',region:'lower',step:10},
{name:'Bulgarian Split Squat',sets:3,repsMin:8,repsMax:10,rirTarget:3,rest:150,type:'compound',region:'lower',step:5,note:'Per leg.'},
{name:'Leg Press (Flat Foot)',sets:3,repsMin:10,repsMax:12,rirTarget:3,rest:120,type:'compound',region:'lower',step:10},

function P(){return PROGRAMS[S.selectedProgramKey]||PROGRAMS.glutePullPush}
function td(){const n=new Date();return new Date(n.getTime()-n.getTimezoneOffset()*60000).toISOString().split('T')[0]}
function pr(d){const x=d?new Date(d+'T12:00:00'):new Date();return x.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})}
function oK(p){return Object.values((p||P()).workouts).sort((a,b)=>(a.dayNumber||0)-(b.dayNumber||0)).map(w=>w.key)}
function aWK(p){p=p||P();const ordered=oK(p);
// Find which workouts have been saved this week for this program
const weekLogs=S.logs.filter(l=>l.week===S.currentWeek&&l.programKey===p.key);
const loggedKeys=new Set(weekLogs.map(l=>l.workoutKey));
// Pick the first unlogged workout in order
const next=ordered.find(k=>!loggedKeys.has(k));
if(next) return next;
// All done this week — fall back to day-of-week match, then first
const d=new Date().getDay(),s=Object.values(p.workouts).map(w=>({k:w.key,d:w.dayNumber})).sort((a,b)=>a.d-b.d),e=s.find(x=>x.d===d);
if(e) return e.k;const n=s.find(x=>x.d>d);return(n||s[0]||{}).k||ordered[0]}
function cl(v){return Math.max(1,Math.min(12,v))}
function eW(){const p=P();if(!S.selectedWorkoutKey||!p.workouts[S.selectedWorkoutKey])S.selectedWorkoutKey=aWK(p)}
function hD(p){return Number((p||P()).deloadWeek)>0}
function tS(x,p){p=p||P();return(!hD(p)||S.currentWeek!==p.deloadWeek)?x.sets:Math.max(1,Math.ceil(x.sets/2))}
function dK(d,w,pk,wk){return`${d||td()}__w${w||S.currentWeek}__${pk||S.selectedProgramKey}__${wk||S.selectedWorkoutKey}`}
function mD(pk,wk){const p=PROGRAMS[pk],w=p.workouts[wk];return{key:dK(td(),S.currentWeek,pk,wk),date:td(),week:S.currentWeek,programKey:pk,workoutKey:wk,notes:'',savedAt:null,exercises:w.exercises.map(x=>({originalName:x.name,actualName:x.name,sets:Array.from({length:tS(x,p)},()=>({weight:'',reps:'',rir:''}))}))}}
function D(){const k=dK();if(S.drafts[k])return S.drafts[k];const d=mD(S.selectedProgramKey,S.selectedWorkoutKey);S.drafts[k]=d;sv();return d}
function pg(d){let n=0,t=0;d.exercises.forEach(x=>x.sets.forEach(s=>{t++;if(Number(s.weight)>0&&Number(s.reps)>0)n++}));return{n,t}}
function vl(x){return x.sets.reduce((s,t)=>s+((Number(t.weight)||0)*(Number(t.reps)||0)),0)}
function hF(nm){const m=[];S.logs.forEach(s=>s.exercises.forEach((x,i)=>{if(x.actualName===nm||x.originalName===nm)m.push({s,x,i})}));return m.sort((a,b)=>a.s.date<b.s.date?1:-1)}
function sP(sets){const c=sets.filter(s=>Number(s.weight)>0||Number(s.reps)>0);if(!c.length)return'No data';const w=c.map(s=>Number(s.weight)||0).filter(Boolean),r=c.map(s=>Number(s.reps)||0).filter(Boolean);return`${w.length?w.join('/'):'-'} × ${r.length?r.join('/'):'-'}`}
function cW(sets){const v=sets.map(s=>Number(s.weight)).filter(x=>x>0);if(!v.length)return 0;const c={};v.forEach(x=>c[x]=(c[x]||0)+1);return Number(Object.entries(c).sort((a,b)=>b[1]-a[1]||Number(b[0])-Number(a[0]))[0][0])}
function rL(v){return Number.isInteger(v)?v:Math.round(v*2)/2}

function lP(a,o){const x=hF(a);if(x.length)return{e:x[0]};const y=hF(o);if(y.length)return{e:y[0]};return null}

function eP(t){return t.intensityType==='rpe'?`${t.intensityMin}–${t.intensityMax}`:t.intensityType==='special'?(t.intensityHint?'note':'-'):String(t.rirTarget)}
function sB(sets,t){const v=sets.filter(s=>Number(s.weight)>0&&Number(s.reps)>0);if(!v.length||!v.every(s=>Number(s.reps)>=t.repsMax))return false;if(t.intensityType==='rpe'){const e=v.map(eV).filter(x=>x>0);return!e.length||(e.reduce((a,b)=>a+b,0)/e.length)<=t.intensityMax}if(t.intensityType==='special')return true;const e=v.map(eV).filter(x=>x>=0),avg=e.length?e.reduce((a,b)=>a+b,0)/e.length:t.rirTarget;return avg<=(t.rirTarget+0.5)}
function sg(cx,t){const l=lP(cx.actualName,cx.originalName);if(!l)return{v:'',l:'No prior data'};const p=l.e.x,b=cW(p.sets);if(!b)return{v:'',l:'No load last time'};const s=p.sets.filter(s=>Number(s.weight)>0&&Number(s.reps)>0),bump=sB(s,t),val=bump?rL(b+(t.step||5)):b;let lb=bump?`Met target → +${t.step||5}`:'Repeat load, beat reps';if(t.intensityType==='special'&&t.intensityHint)lb+=` · ${t.intensityHint}`;return{v:val,l:lb}}

// ═══ SPARKLINE + TRENDS ═══
function getTrend(name,limit){
  const h=hF(name).slice(0,limit||8).reverse();
  if(h.length<2) return null;
  const points=h.map(e=>{const w=cW(e.x.sets);return{date:e.s.date,weight:w,vol:Math.round(vl(e.x))}}).filter(p=>p.weight>0);
  if(points.length<2) return null;
  const first=points[0].weight,last=points[points.length-1].weight;
  const delta=last-first,pct=first>0?Math.round((delta/first)*100):0;
  return{points,delta,pct,up:delta>0,flat:delta===0};
}

function sparkSVG(points,w,h){
  if(!points||points.length<2) return '';
  const vals=points.map(p=>p.weight);
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const range=mx-mn||1;
  const pad=2,iw=w-pad*2,ih=h-pad*2;
  const coords=vals.map((v,i)=>{
    const x=pad+(i/(vals.length-1))*iw;
    const y=pad+ih-(((v-mn)/range)*ih);
    return`${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const color=vals[vals.length-1]>=vals[0]?'var(--gn)':'var(--rd)';
  return`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" fill="none" xmlns="http://www.w3.org/2000/svg"><polyline points="${coords.join(' ')}" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="${coords[coords.length-1].split(',')[0]}" cy="${coords[coords.length-1].split(',')[1]}" r="2" fill="${color}"/></svg>`;
}

function trendHTML(name){
  const t=getTrend(name,8);
  if(!t) return '';
  const svg=sparkSVG(t.points,80,24);
  const cls=t.up?'spark-up':t.flat?'':'spark-dn';
  const arrow=t.up?'↑':t.flat?'→':'↓';
  const lbl=`${arrow} ${t.up?'+':''}${t.delta} lb (${t.up?'+':''}${t.pct}%) over ${t.points.length} sessions`;
  return`<div class="ex-spark">${svg}<span class="${cls}">${lbl}</span></div>`;
}

function aW(ei,ty){const d=D(),x=d.exercises[ei],t=tp(d.programKey,d.workoutKey,ei),l=lP(x.actualName,x.originalName);if(!l){toast('No previous data');return}const ls=l.e.x.sets,s=sg(x,t);x.sets.forEach((st,i)=>{if(ty==='repeat'){const p=ls[i]||ls[ls.length-1]||{};st.weight=p.weight||st.weight}else{if(s.v)st.weight=s.v}});sv();render();toast(ty==='repeat'?'Repeated':'Suggested')}
function svS(){const d=dc(D());d.savedAt=new Date().toISOString();d.programKey=S.selectedProgramKey;const m=S.metricsByDate[d.date]||{},s={...d,metrics:m};const i=S.logs.findIndex(l=>l.key===s.key);if(i>=0)S.logs[i]=s;else S.logs.unshift(s);sv();if(navigator.vibrate)navigator.vibrate([20,40,20]);toast('Saved ✓');render()}
function expD(){const p={exportedAt:new Date().toISOString(),app:'Workout V5',data:S},b=new Blob([JSON.stringify(p,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=`workout-backup-${td()}.json`;a.click();URL.revokeObjectURL(u);toast('Exported')}
function impD(f){const r=new FileReader();r.onload=()=>{try{const p=JSON.parse(r.result),i=p.data||p;if(!i.logs&&!i.drafts)throw 0;S=mg({...dc(DF),...i});eW();sv();render();toast('Imported')}catch(e){toast('Import failed')}};r.readAsText(f)}
function rstA(){if(!confirm('Clear ALL data?'))return;S=dc(DF);eW();sv();render();toast('Cleared')}
function sM(f,v){const d=td();if(!S.metricsByDate[d])S.metricsByDate[d]={sleep:'',energy:'',soreness:'',bodyweight:''};S.metricsByDate[d][f]=v;sv()}

// ═══ RENDER ═══
function render(){if(_rl)return;_rl=true;requestAnimationFrame(()=>{_rl=false;doR()})}
function doR(){eW();const p=P(),w=p.workouts[S.selectedWorkoutKey],dl=hD(p)&&S.currentWeek===p.deloadWeek;
document.getElementById('hT').textContent=w?w.name:p.shortName;
document.getElementById('hS').textContent=pr(td());
document.getElementById('hB').textContent=dl?`W${S.currentWeek} · Deload`:`${p.shortName} · W${S.currentWeek}`;
document.getElementById('wV').textContent=`W${S.currentWeek}`;
document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.tab===S.activeTab));
const c=document.getElementById('C');
if(S.activeTab==='today')c.innerHTML=rT();else if(S.activeTab==='history')c.innerHTML=rH();else if(S.activeTab==='reference')c.innerHTML=rR();else c.innerHTML=rSt();
bind();uT()}

function rT(){const p=P(),w=p.workouts[S.selectedWorkoutKey],d=D(),pr2=pg(d),dl=hD(p)&&S.currentWeek===p.deloadWeek,met=S.metricsByDate[td()]||{sleep:'',energy:'',soreness:'',bodyweight:''},s=gS();
// Figure out which workouts are already logged this week
const weekDone=new Set(S.logs.filter(l=>l.week===S.currentWeek&&l.programKey===S.selectedProgramKey).map(l=>l.workoutKey));
const totalWO=Object.keys(p.workouts).length;
const doneCount=weekDone.size;
let h=`<div class="card"><div class="card-h"><h2>${p.title}</h2><span class="hint">${pr2.n}/${pr2.t} sets</span></div><span class="lbl">Program</span><select class="sel mb12" id="pS">${Object.values(PROGRAMS).map(x=>`<option value="${x.key}" ${x.key===S.selectedProgramKey?'selected':''}>${esc(x.title)}</option>`).join('')}</select>${dl?'<div class="bn bn-w mb8">Deload week — volume auto-halved.</div>':''}<div class="wo-g">${Object.values(p.workouts).sort((a,b)=>(a.dayNumber||0)-(b.dayNumber||0)).map((wo,i)=>{const done=weekDone.has(wo.key);return`<button class="wo-b ${wo.key===S.selectedWorkoutKey?'on':''}" data-wo="${wo.key}"><strong>${wo.name}</strong><span>${done?'✓ Done':'Workout '+(i+1)+' of '+totalWO}</span></button>`}).join('')}</div></div>`;
h+=`<div class="card"><div class="card-h"><h2>Readiness</h2><span class="hint">Check-in</span></div><div class="met"><div class="mf"><label>Sleep</label><input type="number" step="0.5" min="0" max="14" id="mS" value="${met.sleep||''}" placeholder="hrs" inputmode="decimal"></div><div class="mf"><label>Weight</label><input type="number" step="0.1" min="0" id="mB" value="${met.bodyweight||''}" placeholder="lbs" inputmode="decimal"></div><div class="mf"><label>Energy</label><input type="number" min="1" max="5" id="mE" value="${met.energy||''}" placeholder="1-5" inputmode="numeric"></div><div class="mf"><label>Sore</label><input type="number" min="1" max="5" id="mO" value="${met.soreness||''}" placeholder="1-5" inputmode="numeric"></div></div></div>`;
h+=`<div class="card"><div class="stats"><div class="st"><strong>${s.tw}</strong><span>This wk</span></div><div class="st"><strong>${s.se}</strong><span>Total</span></div><div class="st"><strong>${s.st}</strong><span>Sets</span></div><div class="st"><strong>${s.pc}</strong><span>PRs</span></div></div></div>`;
d.exercises.forEach((x,ei)=>{const t=tp(d.programKey,d.workoutKey,ei),l=lP(x.actualName,x.originalName),s2=sg(x,t),subs=[x.originalName,...(p.substitutions[x.originalName]||[])],dn=x.sets.filter(s=>Number(s.weight)>0&&Number(s.reps)>0).length,ad=dn===x.sets.length;
h+=`<div class="ex"><div class="ex-top"><div class="ex-nm">${x.actualName}</div><div class="ex-bd"><span class="bd">${tS(t)} × ${t.repsMin}–${t.repsMax}</span><span class="bd">${eB(t)}</span><span class="bd">Rest ${ft(t.rest)}</span><span class="bd ${ad?'bd-ok':''}">${dn}/${x.sets.length}</span></div>${t.note?`<div class="ex-nt">${t.note}</div>`:''}${t.intensityHint?`<div class="ex-nt">${t.intensityHint}</div>`:''}</div><select class="ex-sb" data-sb="${ei}">${subs.map(n=>`<option value="${esc(n)}" ${n===x.actualName?'selected':''}>${n}</option>`).join('')}</select><div class="ex-hi"><strong>${l?'Last:':'History:'}</strong> ${l?`${l.e.s.date} · ${sP(l.e.x.sets)} · W${l.e.s.week}`:'No prior session.'}<br><span style="color:var(--t3)">${s2.l}${s2.v?` → <strong style="color:var(--ac)">${s2.v}</strong>`:''}</span>${trendHTML(x.actualName)}</div><div class="ex-tl"><button class="tb" data-rp="${ei}">↻ Repeat</button><button class="tb" data-sg="${ei}">↑ Suggest</button><button class="tb tb-t" data-rt="${t.rest}" data-rl="${esc(x.actualName)}">⏱ ${ft(t.rest)}</button></div><div class="sets">${x.sets.map((s,si)=>{const dn2=Number(s.weight)>0&&Number(s.reps)>0;return`<div class="sr${dn2?' dn':''}"><div class="sn">${si+1}</div><div class="sf"><label>Weight</label><input type="number" inputmode="decimal" step="0.5" min="0" value="${s.weight}" placeholder="lb" data-f="${ei}-${si}-weight"></div><div class="sf"><label>Reps</label><input type="number" inputmode="numeric" step="1" min="0" value="${s.reps}" placeholder="${t.repsMin}–${t.repsMax}" data-f="${ei}-${si}-reps"></div><div class="sf"><label>${eL(t)}</label><input type="number" inputmode="decimal" step="0.5" min="0" max="10" value="${s.rir}" placeholder="${eP(t)}" data-f="${ei}-${si}-rir"></div></div>`}).join('')}</div></div>`});
h+=`<div class="card"><span class="lbl">Session notes</span><textarea class="notes" id="sN" placeholder="How did it feel?">${esc(d.notes||'')}</textarea><div class="acts"><button class="bg" id="qE">Export</button><button class="bp" id="svB">Save workout</button></div></div><div class="spacer"></div>`;return h}

function rH(){const opts=[...new Set(S.logs.flatMap(s=>s.exercises.map(e=>e.actualName)))].sort(),fl=window.__hf||'',rows=[];S.logs.forEach(s=>s.exercises.forEach(x=>{if(fl&&x.actualName!==fl)return;const p=PROGRAMS[s.programKey]||P();rows.push({n:x.actualName,o:x.originalName,w:p.workouts[s.workoutKey]?.name||s.workoutKey,p:p.shortName,d:s.date,wk:s.week,s:sP(x.sets),v:Math.round(vl(x))})}));rows.sort((a,b)=>a.d<b.d?1:-1);const s=gS();
let h=`<div class="card"><div class="stats"><div class="st"><strong>${s.se}</strong><span>Sessions</span></div><div class="st"><strong>${s.v.toLocaleString()}</strong><span>Volume</span></div><div class="st"><strong>${s.st}</strong><span>Sets</span></div><div class="st"><strong>${opts.length}</strong><span>Moves</span></div></div></div>`;
h+=`<div class="card"><div class="card-h"><h2>Exercise history</h2></div><span class="lbl">Filter</span><select class="sel mb12" id="hF"><option value="">All</option>${opts.map(n=>`<option value="${esc(n)}" ${n===fl?'selected':''}>${n}</option>`).join('')}</select>${fl?(() => {const t=getTrend(fl,12);return t?`<div class="hi" style="background:rgba(99,220,255,.04);border-color:rgba(99,220,255,.12)"><div class="hi-tp"><span class="hi-n" style="color:var(--ac)">Trend</span><span class="hi-v">${t.points[t.points.length-1].weight} lb</span></div><div class="ex-spark" style="margin-top:4px">${sparkSVG(t.points,120,28)}<span class="${t.up?'spark-up':t.flat?'':'spark-dn'}">${t.up?'↑':t.flat?'→':'↓'} ${t.up?'+':''}${t.delta} lb (${t.up?'+':''}${t.pct}%) over ${t.points.length} sessions</span></div></div>`:''})():''}${rows.length?rows.map(r=>`<div class="hi"><div class="hi-tp"><span class="hi-n">${r.n}</span><span class="hi-v">${r.v.toLocaleString()}</span></div><div class="hi-m">${r.d} · W${r.wk} · ${r.p} · ${r.w}</div>${r.n!==r.o?`<div class="hi-m">Subbed from ${r.o}</div>`:''}<div class="hi-s">${r.s}</div></div>`).join(''):'<div class="hi">No history yet.</div>'}</div><div class="spacer"></div>`;return h}

function rR(){const p=P();let h=`<div class="card"><div class="card-h"><h2>Active program</h2></div><span class="lbl">Program</span><select class="sel mb12" id="rS">${Object.values(PROGRAMS).map(x=>`<option value="${x.key}" ${x.key===S.selectedProgramKey?'selected':''}>${esc(x.title)}</option>`).join('')}</select><div class="ri"><strong>Week ${S.currentWeek}</strong> · ${hD(p)?`Deload W${p.deloadWeek}`:'No deload'}</div></div>`;
h+=`<div class="card"><div class="card-h"><h2>Program rules</h2></div>${p.checklist.map(l=>`<div class="ri">${l}</div>`).join('')}</div>`;
h+=`<div class="card"><div class="card-h"><h2>Schedule</h2></div>${Object.values(p.workouts).sort((a,b)=>(a.dayNumber||0)-(b.dayNumber||0)).map(w=>`<div class="ri"><strong>${w.day}</strong> — ${w.name}<br><span style="color:var(--t3);font-size:12px">${w.focus}</span></div>`).join('')}<div class="ri"><strong>Recovery</strong><br><span style="color:var(--t3);font-size:12px">${p.recoveryNote||'Rest.'}</span></div></div><div class="spacer"></div>`;return h}

function rSt(){let h=`<div class="card"><div class="card-h"><h2>Data &amp; backups</h2><span class="hint">Local-first</span></div><div class="ri mb12">Everything lives in your browser's local storage. Back up regularly.</div><div class="acts mb12"><button class="bg" id="sE">Export</button><label class="bg" style="display:flex;align-items:center;justify-content:center;cursor:pointer">Import<input type="file" id="sI" accept="application/json" style="display:none"></label></div><button class="bg red" id="sR">Reset all data</button></div>`;
h+=`<div class="card"><div class="card-h"><h2>Profile</h2></div><div class="ri mb12">Current: <strong>${S.profile==='dad'?'Upper / Lower':S.profile==='daughter'?'Glute Split':'Not set'}</strong></div><button class="bg" id="sP">Switch profile</button></div>`;
h+=`<div class="card"><div class="card-h"><h2>iPhone tips</h2></div><div class="ri">Tap Share → "Add to Home Screen" in Safari to install as a full-screen app.</div><div class="ri">iOS can purge local storage under pressure. Export after each session.</div></div><div class="spacer"></div>`;return h}

// ═══ EVENTS ═══
function bind(){const c=document.getElementById('C');
const ps=c.querySelector('#pS')||c.querySelector('#rS');if(ps)ps.addEventListener('change',e=>{S.selectedProgramKey=e.target.value;S.selectedWorkoutKey=aWK(P());sv();render();toast('Changed')});
c.querySelectorAll('[data-wo]').forEach(b=>b.addEventListener('click',()=>{S.selectedWorkoutKey=b.dataset.wo;sv();render()}));
c.querySelectorAll('[data-sb]').forEach(s=>s.addEventListener('change',e=>{uN(Number(e.target.dataset.sb),e.target.value);toast('Swapped')}));
c.querySelectorAll('[data-f]').forEach(inp=>{inp.addEventListener('input',e=>{const[ei,si,f]=e.target.dataset.f.split('-');uF(Number(ei),Number(si),f,e.target.value);const row=e.target.closest('.sr');if(row){const ins=row.querySelectorAll('input');const w=Number(ins[0]?.value||0),r=Number(ins[1]?.value||0);const wasDone=row.classList.contains('dn');row.classList.toggle('dn',w>0&&r>0);if(!wasDone&&w>0&&r>0&&!tmr.on){const exCard=row.closest('.ex');const tBtn=exCard?.querySelector('[data-rt]');if(tBtn){stT(Number(tBtn.dataset.rt),tBtn.dataset.rl||'Rest')}}}});inp.addEventListener('blur',()=>setTimeout(()=>{if(!document.activeElement||!document.activeElement.dataset.f)render()},200))});
c.querySelectorAll('[data-rp]').forEach(b=>b.addEventListener('click',()=>aW(Number(b.dataset.rp),'repeat')));
c.querySelectorAll('[data-sg]').forEach(b=>b.addEventListener('click',()=>aW(Number(b.dataset.sg),'suggest')));
c.querySelectorAll('[data-rt]').forEach(b=>b.addEventListener('click',()=>stT(Number(b.dataset.rt),b.dataset.rl||'Rest')));
const mi=[['mS','sleep'],['mE','energy'],['mO','soreness'],['mB','bodyweight']];mi.forEach(([id,f])=>{const e=c.querySelector('#'+id);if(e)e.addEventListener('input',ev=>sM(f,ev.target.value))});
const nt=c.querySelector('#sN');if(nt)nt.addEventListener('input',e=>uNt(e.target.value));
const sb=c.querySelector('#svB');if(sb)sb.addEventListener('click',svS);
const qe=c.querySelector('#qE');if(qe)qe.addEventListener('click',expD);
const hf=c.querySelector('#hF');if(hf)hf.addEventListener('change',e=>{window.__hf=e.target.value;render()});
const se=c.querySelector('#sE');if(se)se.addEventListener('click',expD);
const si=c.querySelector('#sI');if(si)si.addEventListener('change',e=>{const f=e.target.files?.[0];if(f)impD(f)});
const sr=c.querySelector('#sR');if(sr)sr.addEventListener('click',rstA);
const sp=c.querySelector('#sP');if(sp)sp.addEventListener('click',()=>{S.profile='';sv();chk()})}

// ═══ NAV ═══
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{S.activeTab=t.dataset.tab;sv();render()}));
document.getElementById('wD').addEventListener('click',()=>{S.currentWeek=cl(S.currentWeek-1);sv();render()});
document.getElementById('wU').addEventListener('click',()=>{S.currentWeek=cl(S.currentWeek+1);sv();render()});
document.getElementById('aBtn').addEventListener('click',()=>{S.selectedWorkoutKey=aWK(P());sv();render();toast('Auto-selected')});
document.getElementById('tBtn').addEventListener('click',()=>{S.activeTab='today';sv();render()});

// ═══ INIT ═══
chk();eW();render();
</script>
</body>
