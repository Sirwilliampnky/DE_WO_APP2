<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workout" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>" />
  <title>Workout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700;9..40,800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=3" />
</head>
<body>
<div id="gate" class="gate hidden">
  <h1>Workout</h1>
  <p>Who's training today?</p>
  <div class="gate-bs">
    <button class="gate-b" data-pf="dad"><strong>Upper / Lower</strong><span>12-week hypertrophy</span></button>
    <button class="gate-b" data-pf="daughter"><strong>Glute Split</strong><span>Glute / Pull / Legs / Push</span></button>
  </div>
</div>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<div id="restAlert" class="rest-alert hidden"></div>
<div class="app">
  <div class="hdr">
    <div class="hdr-r">
      <div>
        <div class="hdr-t" id="hT">Workout</div>
        <div class="hdr-s" id="hS"></div>
      </div>
      <div class="hdr-bg" id="hB">W1</div>
    </div>
    <div class="wk-r">
      <div class="wk-s">
        <button id="wD" aria-label="Previous week">−</button>
        <div class="wk-v" id="wV">W1</div>
        <button id="wU" aria-label="Next week">+</button>
      </div>
      <button class="chip" id="aBtn" title="Resume or pick the next workout">Next</button>
      <button class="chip" id="tBtn" title="Jump to today's date">Today</button>
      <button class="chip" id="gBtn" title="Toggle gym">Gym: YMCA</button>
      <div style="flex:1"></div>
      <button class="chip" id="pBtn" title="Switch profile" aria-label="Switch profile">⇄ Profile</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" data-tab="today">Today</button>
    <button class="tab" data-tab="history">History</button>
    <button class="tab" data-tab="reference">Ref</button>
    <button class="tab" data-tab="settings">Settings</button>
  </div>
  <main id="C"></main>
</div>
<div id="tmr" class="tmr">
  <div class="tmr-r">
    <div>
      <div class="tmr-l" id="tL">Rest</div>
      <div class="tmr-t" id="tT">0:00</div>
    </div>
    <div class="tmr-a">
      <button id="tAdd">+30s</button>
      <button id="tP">Pause</button>
      <button id="tX" aria-label="Dismiss timer">✕</button>
    </div>
  </div>
  <div class="tmr-tk"><div class="tmr-fl" id="tF"></div></div>
</div>
<script src="js/data.js?v=3"></script>
<script src="js/app.js?v=3"></script>
</body>
</html>
