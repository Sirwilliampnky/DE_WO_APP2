<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0f1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workout" />
  <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiV29ya291dCBWNSIsInNob3J0X25hbWUiOiJXb3Jrb3V0Iiwic3RhcnRfdXJsIjoiLiIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiMwYTBmMWEiLCJ0aGVtZV9jb2xvciI6IiMwYTBmMWEiLCJpY29ucyI6W119" />
  <title>Workout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0f1a;
      --bg-raised: #111827;
      --bg-input: #0d1322;
      --surface: rgba(17, 24, 39, 0.96);
      --surface-hover: rgba(22, 31, 48, 0.96);
      --border: rgba(148, 163, 184, 0.1);
      --border-focus: rgba(99, 220, 255, 0.4);
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-dim: #64748b;
      --accent: #63dcff;
      --accent-glow: rgba(99, 220, 255, 0.15);
      --green: #4ade80;
      --green-glow: rgba(74, 222, 128, 0.12);
      --amber: #fbbf24;
      --amber-glow: rgba(251, 191, 36, 0.1);
      --red: #fb7185;
      --red-glow: rgba(251, 113, 133, 0.08);
      --radius: 16px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --font: 'DM Sans', system-ui, -apple-system, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
      --shadow: 0 8px 32px rgba(0,0,0,0.3);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      padding-top: env(safe-area-inset-top, 0px);
    }
    button { font: inherit; border: none; cursor: pointer; color: inherit; background: none; -webkit-appearance: none; }
    input, select, textarea { font: inherit; -webkit-appearance: none; appearance: none; }

    /* ─── Layout ─── */
    .app { max-width: 480px; margin: 0 auto; padding: 0 12px; }

    /* ─── Profile gate ─── */
    .profile-gate {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--bg); padding: 32px;
    }
    .profile-gate h1 {
      font-size: 32px; font-weight: 800; margin-bottom: 6px;
      background: linear-gradient(135deg, var(--accent), var(--green));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .profile-gate p { color: var(--text-secondary); margin-bottom: 32px; font-size: 15px; }
    .profile-buttons { display: grid; gap: 12px; width: 100%; max-width: 300px; }
    .profile-btn {
      padding: 20px; border-radius: var(--radius); text-align: center;
      background: var(--bg-raised); border: 1px solid var(--border);
      transition: all 0.15s ease;
    }
    .profile-btn:active { transform: scale(0.97); }
    .profile-btn strong { display: block; font-size: 18px; margin-bottom: 2px; }
    .profile-btn span { font-size: 13px; color: var(--text-secondary); }

    /* ─── Header ─── */
    .header {
      position: sticky; top: 0; z-index: 30;
      background: rgba(10, 15, 26, 0.92);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px 10px;
    }
    .header-row { display: flex; justify-content: space-between; align-items: center; }
    .header-title { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
    .header-sub { font-size: 12px; color: var(--text-dim); margin-top: 1px; }
    .header-badge {
      font-family: var(--mono); font-size: 11px; font-weight: 600;
      padding: 5px 10px; border-radius: 999px;
      background: var(--accent-glow); color: var(--accent);
      white-space: nowrap;
    }

    /* ─── Week control ─── */
    .week-ctrl {
      display: flex; align-items: center; gap: 8px; margin-top: 10px;
    }
    .week-stepper {
      display: flex; align-items: center; gap: 0;
      background: var(--bg-raised); border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden;
    }
    .week-stepper button {
      width: 36px; height: 36px; font-size: 18px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary);
    }
    .week-stepper button:active { background: rgba(255,255,255,0.05); }
    .week-stepper .week-val {
      font-family: var(--mono); font-size: 13px; font-weight: 600;
      padding: 0 6px; min-width: 50px; text-align: center;
      color: var(--text);
    }
    .chip-btn {
      height: 36px; padding: 0 12px; border-radius: 10px; font-size: 12px; font-weight: 700;
      background: var(--bg-raised); border: 1px solid var(--border); color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
      white-space: nowrap;
    }
    .chip-btn:active { background: var(--surface-hover); }

    /* ─── Tabs ─── */
    .tabs {
      display: flex; gap: 4px; padding: 10px 0 6px;
      position: sticky; top: 82px; z-index: 25;
      background: rgba(10, 15, 26, 0.94);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .tab {
      flex: 1; padding: 10px 0; border-radius: 10px; text-align: center;
      font-size: 13px; font-weight: 700; color: var(--text-dim);
      background: transparent; border: 1px solid transparent;
      transition: all 0.12s ease;
    }
    .tab.active {
      color: var(--text); background: var(--accent-glow); border-color: rgba(99,220,255,0.2);
    }
    .tab:active { transform: scale(0.97); }

    /* ─── Cards / Sections ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
    }
    .card-head {
      display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
      margin-bottom: 12px;
    }
    .card-head h2 { font-size: 16px; font-weight: 700; }
    .card-hint { font-size: 11px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }

    /* ─── Workout chooser ─── */
    .workout-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
    }
    .wo-btn {
      padding: 12px; border-radius: var(--radius-sm); text-align: left;
      background: rgba(255,255,255,0.02); border: 1px solid var(--border);
      transition: all 0.12s ease;
    }
    .wo-btn.active {
      background: var(--accent-glow); border-color: rgba(99,220,255,0.35);
    }
    .wo-btn:active { transform: scale(0.97); }
    .wo-btn strong { display: block; font-size: 13px; }
    .wo-btn span { font-size: 11px; color: var(--text-dim); }

    /* ─── Stats row ─── */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .stat-cell {
      padding: 10px 8px; border-radius: var(--radius-sm); text-align: center;
      background: rgba(255,255,255,0.02); border: 1px solid var(--border);
    }
    .stat-cell strong { display: block; font-family: var(--mono); font-size: 18px; font-weight: 700; }
    .stat-cell span { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; }

    /* ─── Metrics ─── */
    .metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .metric-field label {
      display: block; font-size: 10px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; font-weight: 600;
    }
    .metric-field input {
      width: 100%; padding: 10px 8px; text-align: center;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius-xs); color: var(--text); font-size: 15px;
      outline: none;
    }
    .metric-field input:focus { border-color: var(--border-focus); }

    /* ─── Program selector ─── */
    .prog-select {
      width: 100%; padding: 10px 12px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius-xs); color: var(--text); font-size: 14px;
      outline: none;
    }
    .prog-select:focus { border-color: var(--border-focus); }

    /* ─── Exercise card ─── */
    .ex-card {
      border-radius: var(--radius); margin-bottom: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      background: linear-gradient(180deg, rgba(17,24,39,0.98), rgba(13,19,34,0.96));
    }
    .ex-top { padding: 14px 14px 10px; }
    .ex-name { font-size: 17px; font-weight: 800; letter-spacing: -0.01em; }
    .ex-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .badge {
      font-size: 11px; font-weight: 600; padding: 4px 8px; border-radius: 6px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      color: var(--text-secondary); white-space: nowrap;
    }
    .badge-done { background: var(--green-glow); border-color: rgba(74,222,128,0.2); color: var(--green); }
    .ex-note { font-size: 12px; color: var(--text-dim); margin-top: 6px; }

    .ex-sub {
      margin: 0 14px 8px; padding: 8px 10px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius-xs); color: var(--text); font-size: 13px;
      width: calc(100% - 28px); outline: none;
    }
    .ex-sub:focus { border-color: var(--border-focus); }

    .ex-history {
      margin: 0 14px 10px; padding: 10px 12px;
      border-radius: var(--radius-xs);
      background: rgba(99,220,255,0.05); border: 1px solid rgba(99,220,255,0.12);
      font-size: 12px; color: #b8e8f8;
    }
    .ex-history strong { color: var(--accent); }

    .ex-tools {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px;
      padding: 0 14px 10px;
    }
    .tool-btn {
      padding: 10px 6px; border-radius: var(--radius-xs); text-align: center;
      font-size: 12px; font-weight: 700; color: var(--text-secondary);
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    }
    .tool-btn:active { background: rgba(255,255,255,0.07); }
    .tool-btn.timer-btn { color: var(--amber); background: var(--amber-glow); border-color: rgba(251,191,36,0.15); }

    /* ─── Set rows ─── */
    .sets-area { padding: 0 10px 12px; }
    .set-row {
      display: grid; grid-template-columns: 40px 1fr 1fr 1fr; gap: 6px;
      align-items: end;
      padding: 8px 6px; margin-bottom: 6px;
      background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.03);
      border-radius: var(--radius-sm);
      transition: all 0.2s ease;
    }
    .set-row.done {
      background: rgba(74,222,128,0.06); border-color: rgba(74,222,128,0.15);
    }
    .set-num {
      width: 40px; height: 48px; display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--text-dim);
      background: rgba(255,255,255,0.03); border-radius: var(--radius-xs);
    }
    .set-done .set-num { color: var(--green); }
    .set-field label {
      display: block; font-size: 9px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; font-weight: 600;
    }
    .set-field input {
      width: 100%; height: 48px; padding: 6px 4px; text-align: center;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius-xs); color: var(--text);
      font-family: var(--mono); font-size: 16px; font-weight: 600;
      outline: none;
    }
    .set-field input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 2px rgba(99,220,255,0.08);
    }
    .set-field input::placeholder { color: var(--text-dim); font-size: 12px; font-family: var(--font); font-weight: 400; }

    /* ─── Session notes + actions ─── */
    .notes-area {
      width: 100%; min-height: 80px; padding: 12px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-size: 14px;
      resize: vertical; outline: none;
    }
    .notes-area:focus { border-color: var(--border-focus); }
    .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }

    .btn-primary {
      padding: 16px; border-radius: var(--radius-sm); font-weight: 800; font-size: 15px;
      background: linear-gradient(135deg, var(--accent), var(--green));
      color: #04131c; text-align: center;
      box-shadow: 0 4px 20px rgba(99,220,255,0.15);
    }
    .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
    .btn-ghost {
      padding: 16px; border-radius: var(--radius-sm); font-weight: 700; font-size: 14px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      color: var(--text-secondary); text-align: center;
    }
    .btn-ghost:active { background: rgba(255,255,255,0.06); }
    .btn-ghost.danger { color: var(--red); }

    /* ─── Banners ─── */
    .banner {
      padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 10px;
    }
    .banner-warn { background: var(--amber-glow); border: 1px solid rgba(251,191,36,0.2); color: #fde68a; }
    .banner-info { background: var(--green-glow); border: 1px solid rgba(74,222,128,0.18); color: #bbf7d0; }

    /* ─── History items ─── */
    .hist-item {
      padding: 12px; border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.02); border: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .hist-top { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; }
    .hist-name { font-size: 15px; font-weight: 700; }
    .hist-vol { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--green); }
    .hist-meta { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
    .hist-sets { font-size: 13px; margin-top: 6px; color: var(--text-secondary); }

    /* ─── Reference list ─── */
    .ref-item {
      padding: 12px; border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.02); border: 1px solid var(--border);
      margin-bottom: 8px; font-size: 14px; line-height: 1.5;
    }

    /* ─── Timer bar ─── */
    .timer-bar {
      position: fixed; left: 8px; right: 8px; z-index: 50;
      bottom: calc(8px + var(--safe-bottom));
      padding: 14px 16px 12px;
      background: rgba(10,15,26,0.96);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius); display: none;
      box-shadow: 0 -4px 32px rgba(0,0,0,0.4);
    }
    .timer-bar.show { display: block; }
    .timer-row { display: flex; justify-content: space-between; align-items: center; }
    .timer-label { font-size: 12px; color: var(--text-dim); }
    .timer-time { font-family: var(--mono); font-size: 32px; font-weight: 700; color: var(--accent); letter-spacing: -0.02em; }
    .timer-actions { display: flex; gap: 6px; }
    .timer-actions button {
      padding: 8px 14px; border-radius: var(--radius-xs); font-size: 13px; font-weight: 700;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text-secondary);
    }
    .timer-actions button:active { background: rgba(255,255,255,0.1); }
    .timer-track { height: 4px; border-radius: 999px; background: rgba(255,255,255,0.06); margin-top: 10px; overflow: hidden; }
    .timer-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 999px; transition: width 0.3s linear; }

    /* ─── Toast ─── */
    .toast {
      position: fixed; top: calc(12px + env(safe-area-inset-top, 0px)); left: 50%;
      transform: translate(-50%, -10px); opacity: 0; pointer-events: none;
      background: rgba(10,15,26,0.96); color: var(--text);
      border: 1px solid var(--border); border-radius: 999px;
      padding: 10px 16px; font-size: 13px; font-weight: 700; z-index: 60;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      transition: all 0.2s ease;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    /* ─── Utilities ─── */
    .hidden { display: none !important; }
    .mb-8 { margin-bottom: 8px; }
    .mb-12 { margin-bottom: 12px; }
    .mt-12 { margin-top: 12px; }
    .spacer { height: calc(80px + var(--safe-bottom)); }
    .text-dim { color: var(--text-dim); }
    .text-sm { font-size: 12px; }
    .label { display: block; font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; font-weight: 600; }

    @media (max-width: 374px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .metrics-row { grid-template-columns: repeat(2, 1fr); }
      .ex-tools { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div id="profileGate" class="profile-gate hidden">
  <h1>Workout</h1>
  <p>Who's training today?</p>
  <div class="profile-buttons">
    <button class="profile-btn" data-profile="dad">
      <strong>Upper / Lower</strong>
      <span>12-week hypertrophy</span>
    </button>
    <button class="profile-btn" data-profile="daughter">
      <strong>Glute Split</strong>
      <span>Glute / Pull / Legs / Push</span>
    </button>
  </div>
</div>

<div id="toast" class="toast"></div>

<div class="app">
  <div class="header">
    <div class="header-row">
      <div>
        <div class="header-title" id="headerTitle">Workout</div>
        <div class="header-sub" id="headerSub"></div>
      </div>
      <div class="header-badge" id="headerBadge">Week 1</div>
    </div>
    <div class="week-ctrl">
      <div class="week-stepper">
        <button id="weekDown">−</button>
        <div class="week-val" id="weekVal">W1</div>
        <button id="weekUp">+</button>
      </div>
      <button class="chip-btn" id="autoBtn">Auto</button>
      <button class="chip-btn" id="todayBtn">Today</button>
      <div style="flex:1"></div>
      <button class="chip-btn" id="profileSwitch" title="Switch profile">⇄</button>
    </div>
  </div>

  <div class="tabs" id="tabBar">
    <button class="tab active" data-tab="today">Today</button>
    <button class="tab" data-tab="history">History</button>
    <button class="tab" data-tab="reference">Reference</button>
    <button class="tab" data-tab="settings">Settings</button>
  </div>

  <main id="content"></main>
</div>

<div id="timerBar" class="timer-bar">
  <div class="timer-row">
    <div>
      <div class="timer-label" id="timerLabel">Rest</div>
      <div class="timer-time" id="timerTime">0:00</div>
    </div>
    <div class="timer-actions">
      <button id="timerPlus">+30s</button>
      <button id="timerPause">Pause</button>
      <button id="timerClose">✕</button>
    </div>
  </div>
  <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
</div>

<script>
/* ═══════════════════════════════════════════
   PROGRAM DATA
   ═══════════════════════════════════════════ */

const PROGRAMS = {
  upperLower12: {
    key: 'upperLower12',
    title: '12-Week Upper / Lower Hypertrophy',
    shortName: 'Upper / Lower',
    profileHint: 'dad',
    deloadWeek: 7,
    schedule: { 1: 'Upper A', 2: 'Lower A', 4: 'Upper B', 5: 'Lower B' },
    workouts: {
      upperA: {
        key: 'upperA', dayNumber: 1, day: 'Monday', name: 'Upper A', focus: 'Horizontal push / pull',
        exercises: [
          { name: 'Barbell Bench Press', sets: 4, repsMin: 5, repsMax: 8, rirTarget: 2, rest: 180, note: 'Main press. Add reps before load.', type: 'compound', region: 'upper', step: 5 },
          { name: 'Chest-Supported Row', sets: 4, repsMin: 6, repsMax: 8, rirTarget: 2, rest: 180, type: 'compound', region: 'upper', step: 5 },
          { name: 'Incline DB Press', sets: 3, repsMin: 8, repsMax: 10, rirTarget: 3, rest: 120, type: 'compound', region: 'upper', step: 5 },
          { name: 'Lat Pulldown (V-bar)', sets: 3, repsMin: 8, repsMax: 10, rirTarget: 3, rest: 120, type: 'compound', region: 'upper', step: 5 },
          { name: 'Face Pulls', sets: 2, repsMin: 12, repsMax: 15, rirTarget: 3, rest: 90, type: 'accessory', region: 'upper', step: 2.5 },
          { name: 'Barbell Curl', sets: 2, repsMin: 8, repsMax: 10, rirTarget: 3, rest: 90, type: 'accessory', region: 'upper', step: 2.5 }
        ]
      },
      lowerA: {
        key: 'lowerA', dayNumber: 2, day: 'Tuesday', name: 'Lower A', focus: 'Quad focus',

/* ═══════════════════════════════════════════
   STATE MANAGEMENT
   ═══════════════════════════════════════════ */

const STORAGE_KEY = 'workout_v5_state';
const V4_KEY = 'workout_v4_state';
const V3_KEY = 'workout_v3_state';

const defaultState = {
  version: 5,
  profile: '',
  currentWeek: 1,
  selectedProgramKey: '',
  selectedWorkoutKey: '',
  activeTab: 'today',
  metricsByDate: {},
  drafts: {},
  logs: []
};

let state = loadState();
let timer = { duration: 0, remaining: 0, running: false, label: '', intervalId: null };
let _renderLock = false;

function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(V4_KEY) || localStorage.getItem(V3_KEY);
    if (!raw) return deepClone(defaultState);
    const parsed = JSON.parse(raw);
    return migrate({ ...deepClone(defaultState), ...parsed });
  } catch (e) {
    console.error('State load error:', e);
    return deepClone(defaultState);
  }
}

function migrate(s) {
  s.version = 5;
  if (!s.profile) s.profile = '';
  if (!PROGRAMS[s.selectedProgramKey]) {
    s.selectedProgramKey = s.profile === 'dad' ? 'upperLower12' : 'glutePullPush';
  }
  s.drafts = s.drafts || {};
  s.logs = Array.isArray(s.logs) ? s.logs : [];
  Object.values(s.drafts).forEach(d => {
    if (!d.programKey) d.programKey = inferProgram(d.workoutKey);
  });
  s.logs = s.logs.map(l => ({ ...l, programKey: l.programKey || inferProgram(l.workoutKey) }));
  return s;
}

function inferProgram(wk) {
  if (!wk) return 'glutePullPush';
  const found = Object.values(PROGRAMS).find(p => p.workouts[wk]);
  return found ? found.key : 'glutePullPush';
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }


/* ═══════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════ */

function program() { return PROGRAMS[state.selectedProgramKey] || PROGRAMS.glutePullPush; }

function todayISO() {
  const n = new Date();
  return new Date(n.getTime() - n.getTimezoneOffset() * 60000).toISOString().split('T')[0];
}

function prettyDate(ds) {
  const d = ds ? new Date(ds + 'T12:00:00') : new Date();
  return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
}

function orderedKeys(prog) {
  return Object.values((prog || program()).workouts).sort((a,b) => (a.dayNumber||0)-(b.dayNumber||0)).map(w => w.key);
}

function autoWorkoutKey(prog) {
  prog = prog || program();
  const dow = new Date().getDay();
  const sorted = Object.values(prog.workouts).map(w => ({ key: w.key, dn: w.dayNumber })).sort((a,b) => a.dn - b.dn);
  const exact = sorted.find(e => e.dn === dow);
  if (exact) return exact.key;
  const next = sorted.find(e => e.dn > dow);
  return (next || sorted[0] || {}).key || orderedKeys(prog)[0];
}

function clampWeek(v) { return Math.max(1, Math.min(12, v)); }

function ensureWorkout() {
  const p = program();
  if (!state.selectedWorkoutKey || !p.workouts[state.selectedWorkoutKey]) {
    state.selectedWorkoutKey = autoWorkoutKey(p);
  }
}

function hasDeload(p) { return Number((p || program()).deloadWeek) > 0; }

function targetSets(ex, prog) {
  prog = prog || program();
  if (!hasDeload(prog) || state.currentWeek !== prog.deloadWeek) return ex.sets;
  return Math.max(1, Math.ceil(ex.sets / 2));
}

function draftKey(date, week, pk, wk) {
  return `${date || todayISO()}__w${week || state.currentWeek}__${pk || state.selectedProgramKey}__${wk || state.selectedWorkoutKey}`;
}

function buildDraft(pk, wk) {
  const p = PROGRAMS[pk], w = p.workouts[wk];
  return {
    key: draftKey(todayISO(), state.currentWeek, pk, wk),
    date: todayISO(), week: state.currentWeek, programKey: pk, workoutKey: wk,
    notes: '', savedAt: null,
    exercises: w.exercises.map(ex => ({
      originalName: ex.name, actualName: ex.name,
      sets: Array.from({ length: targetSets(ex, p) }, () => ({ weight: '', reps: '', rir: '' }))
    }))
  };
}

function draft() {
  const k = draftKey();
  if (state.drafts[k]) return state.drafts[k];
  const d = buildDraft(state.selectedProgramKey, state.selectedWorkoutKey);
  state.drafts[k] = d;
  save();
  return d;
}

function progress(d) {
  let done = 0, total = 0;
  d.exercises.forEach(ex => ex.sets.forEach(s => { total++; if (Number(s.weight) > 0 && Number(s.reps) > 0) done++; }));
  return { done, total };
}

function volume(ex) { return ex.sets.reduce((s, set) => s + ((Number(set.weight)||0) * (Number(set.reps)||0)), 0); }

function historyFor(name) {
  const m = [];
  state.logs.forEach(ses => ses.exercises.forEach((ex, i) => {
    if (ex.actualName === name || ex.originalName === name) m.push({ session: ses, exercise: ex, index: i });
  }));
  return m.sort((a,b) => a.session.date < b.session.date ? 1 : -1);
}

function setPattern(sets) {
  const c = sets.filter(s => Number(s.weight) > 0 || Number(s.reps) > 0);
  if (!c.length) return 'No data yet';
  const w = c.map(s => Number(s.weight)||0).filter(Boolean);
  const r = c.map(s => Number(s.reps)||0).filter(Boolean);
  return `${w.length ? w.join('/') : '—'} lb × ${r.length ? r.join('/') : '—'}`;
}

function commonWeight(sets) {
  const vals = sets.map(s => Number(s.weight)).filter(v => v > 0);
  if (!vals.length) return 0;
  const c = {}; vals.forEach(v => c[v] = (c[v]||0)+1);
  return Number(Object.entries(c).sort((a,b) => b[1]-a[1] || Number(b[0])-Number(a[0]))[0][0]);
}

function roundLoad(v) { return Number.isInteger(v) ? v : Math.round(v * 2) / 2; }

function template(pk, wk, ei) { return PROGRAMS[pk].workouts[wk].exercises[ei]; }

function lastPerf(actual, original) {
  const a = historyFor(actual);
  if (a.length) return { source: actual, entry: a[0] };
  const o = historyFor(original);
  if (o.length) return { source: original, entry: o[0] };
  return null;
}

function effortVal(s) { return Number(s.rir); }

function effortBadge(t) {
  if (t.intensityType === 'rpe') return `RPE ${t.intensityMin}–${t.intensityMax}`;
  if (t.intensityType === 'special') return t.intensityLabel || 'Special';
  return `RIR ${t.rirTarget}`;
}

function effortLabel(t) {
  if (t.intensityType === 'rpe') return 'RPE';
  if (t.intensityType === 'special') return 'Effort';
  return 'RIR';
}

function effortPH(t) {
  if (t.intensityType === 'rpe') return `${t.intensityMin}–${t.intensityMax}`;
  if (t.intensityType === 'special') return t.intensityHint ? 'note' : '—';
  return String(t.rirTarget);
}

function shouldBump(sets, t) {
  const v = sets.filter(s => Number(s.weight) > 0 && Number(s.reps) > 0);
  if (!v.length || !v.every(s => Number(s.reps) >= t.repsMax)) return false;
  if (t.intensityType === 'rpe') {
    const e = v.map(effortVal).filter(x => x > 0);
    return !e.length || (e.reduce((a,b)=>a+b,0)/e.length) <= t.intensityMax;
  }
  if (t.intensityType === 'special') return true;
  const e = v.map(effortVal).filter(x => x >= 0);
  const avg = e.length ? e.reduce((a,b)=>a+b,0)/e.length : t.rirTarget;
  return avg <= (t.rirTarget + 0.5);
}

function suggest(curEx, t) {
  const last = lastPerf(curEx.actualName, curEx.originalName);
  if (!last) return { value: '', label: 'No prior data' };
  const prev = last.entry.exercise;
  const base = commonWeight(prev.sets);
  if (!base) return { value: '', label: 'No load recorded last time' };
  const sets = prev.sets.filter(s => Number(s.weight) > 0 && Number(s.reps) > 0);
  const bump = shouldBump(sets, t);
  const val = bump ? roundLoad(base + (t.step || 5)) : base;
  let lbl = bump ? `Met target → try +${t.step || 5}` : 'Repeat load, beat reps';
  if (t.intensityType === 'special' && t.intensityHint) lbl += ` · ${t.intensityHint}`;
  return { value: val, label: lbl };
}

function getStats() {
  let sessions = state.logs.length, vol = 0, sets = 0, prs = {}, prCount = 0;
  state.logs.forEach(ses => ses.exercises.forEach(ex => {
    vol += volume(ex);
    ex.sets.forEach(s => {
      if (Number(s.weight) > 0 && Number(s.reps) > 0) sets++;
      const k = ex.actualName, sc = Number(s.weight) || 0;
      if (sc > (prs[k] || 0)) { if (prs[k] !== undefined) prCount++; prs[k] = sc; }
    });
  }));
  const thisWeek = state.logs.filter(l => l.week === state.currentWeek && l.programKey === state.selectedProgramKey).length;
  return { sessions, vol: Math.round(vol), sets, prCount, thisWeek };
}

function esc(v) { return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function fmtTime(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

   PROFILE GATE
   ═══════════════════════════════════════════ */

function checkProfile() {
  if (state.profile) {
    document.getElementById('profileGate').classList.add('hidden');
    return;
  }
  document.getElementById('profileGate').classList.remove('hidden');
}

document.querySelectorAll('[data-profile]').forEach(btn => {
  btn.addEventListener('click', () => {
    state.profile = btn.dataset.profile;
    state.selectedProgramKey = btn.dataset.profile === 'dad' ? 'upperLower12' : 'glutePullPush';
    state.selectedWorkoutKey = autoWorkoutKey(program());
    save();
    document.getElementById('profileGate').classList.add('hidden');
    render();
    toast('Let\'s go!');
  });
});

document.getElementById('profileSwitch').addEventListener('click', () => {
  state.profile = '';
  save();
  checkProfile();
});


/* ═══════════════════════════════════════════
   TIMER
   ═══════════════════════════════════════════ */

function startTimer(dur, label) {
  clearInterval(timer.intervalId);
  timer = { duration: dur, remaining: dur, running: true, label: label || 'Rest', intervalId: null };
  updateTimer();
  timer.intervalId = setInterval(() => {
    if (!timer.running) return;
    timer.remaining--;
    if (timer.remaining <= 0) {
      timer.remaining = 0; timer.running = false;
      clearInterval(timer.intervalId);
      if (navigator.vibrate) navigator.vibrate([120, 50, 120]);
      toast(`${timer.label} done`);
    }
    updateTimer();
  }, 1000);
}

function updateTimer() {
  const bar = document.getElementById('timerBar');
  if (!timer.duration) { bar.classList.remove('show'); return; }
  bar.classList.add('show');
  document.getElementById('timerTime').textContent = fmtTime(timer.remaining);
  document.getElementById('timerLabel').textContent = timer.label;
  document.getElementById('timerFill').style.width = `${Math.max(0, ((timer.duration - timer.remaining) / timer.duration) * 100)}%`;
  document.getElementById('timerPause').textContent = timer.running ? 'Pause' : 'Play';
}

function closeTimer() {
  clearInterval(timer.intervalId);
  timer = { duration: 0, remaining: 0, running: false, label: '', intervalId: null };
  updateTimer();
}

document.getElementById('timerPlus').addEventListener('click', () => { if (!timer.duration) return; timer.duration += 30; timer.remaining += 30; updateTimer(); });
document.getElementById('timerPause').addEventListener('click', () => { if (!timer.duration) return; timer.running = !timer.running; updateTimer(); });
document.getElementById('timerClose').addEventListener('click', closeTimer);


/* ═══════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════ */

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 2000);
}


/* ═══════════════════════════════════════════
   ACTIONS
   ═══════════════════════════════════════════ */

function updateField(ei, si, field, val) {
  const d = draft();
  d.exercises[ei].sets[si][field] = val;
  save();
}

function updateName(ei, val) {
  const d = draft();
  d.exercises[ei].actualName = val;
  save();
  render();
}

function updateNotes(val) { draft().notes = val; save(); }

function applyWeight(ei, type) {
  const d = draft(), ex = d.exercises[ei];
  const t = template(d.programKey, d.workoutKey, ei);
  const last = lastPerf(ex.actualName, ex.originalName);
  if (!last) { toast('No previous data'); return; }
  const lastSets = last.entry.exercise.sets;
  const sug = suggest(ex, t);
  ex.sets.forEach((s, idx) => {
    if (type === 'repeat') {
      const prev = lastSets[idx] || lastSets[lastSets.length - 1] || {};
      s.weight = prev.weight || s.weight;
    } else {
      if (sug.value) s.weight = sug.value;
    }
  });
  save(); render();
  toast(type === 'repeat' ? 'Repeated loads' : 'Suggested loads filled');
}

function saveSession() {
  const d = deepClone(draft());
  d.savedAt = new Date().toISOString();
  d.programKey = state.selectedProgramKey;
  const metrics = state.metricsByDate[d.date] || {};
  const session = { ...d, metrics };
  const idx = state.logs.findIndex(l => l.key === session.key);
  if (idx >= 0) state.logs[idx] = session; else state.logs.unshift(session);
  save();
  if (navigator.vibrate) navigator.vibrate([20, 40, 20]);
  toast('Workout saved ✓');
  render();
}

function exportData() {
  const payload = { exportedAt: new Date().toISOString(), app: 'Workout V5', data: state };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `workout-backup-${todayISO()}.json`; a.click();
  URL.revokeObjectURL(url);
  toast('Backup exported');
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      const incoming = parsed.data || parsed;
      if (!incoming.logs && !incoming.drafts) throw new Error('Invalid');
      state = migrate({ ...deepClone(defaultState), ...incoming });
      ensureWorkout(); save(); render();
      toast('Backup imported');
    } catch (e) {
      console.error(e); toast('Import failed');
    }
  };
  reader.readAsText(file);
}

function resetAll() {
  if (!confirm('Clear ALL workout data? This cannot be undone.')) return;
  state = deepClone(defaultState);
  ensureWorkout(); save(); render();
  toast('All data cleared');
}

function setMetric(field, val) {
  const d = todayISO();
  if (!state.metricsByDate[d]) state.metricsByDate[d] = { sleep: '', energy: '', soreness: '', bodyweight: '' };
  state.metricsByDate[d][field] = val;
  save();
}


/* ═══════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════ */

function render() {
  if (_renderLock) return;
  _renderLock = true;
  requestAnimationFrame(() => { _renderLock = false; doRender(); });
}

function doRender() {
  ensureWorkout();
  const p = program(), w = p.workouts[state.selectedWorkoutKey];
  const isDeload = hasDeload(p) && state.currentWeek === p.deloadWeek;

  // Header
  document.getElementById('headerTitle').textContent = w ? w.name : p.shortName;
  document.getElementById('headerSub').textContent = prettyDate(todayISO());
  document.getElementById('headerBadge').textContent = isDeload ? `W${state.currentWeek} · Deload` : `${p.shortName} · W${state.currentWeek}`;
  document.getElementById('weekVal').textContent = `W${state.currentWeek}`;

  // Tabs
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === state.activeTab));

  // Content
  const c = document.getElementById('content');
  switch (state.activeTab) {
    case 'today': c.innerHTML = renderToday(); break;
    case 'history': c.innerHTML = renderHistory(); break;
    case 'reference': c.innerHTML = renderRef(); break;
    case 'settings': c.innerHTML = renderSettings(); break;
  }

  bindEvents();
  updateTimer();
}


/* ─── TODAY TAB ─── */

function renderToday() {
  const p = program(), w = p.workouts[state.selectedWorkoutKey];
  const d = draft(), prog = progress(d);
  const dow = new Date().getDay();
  const isScheduled = autoWorkoutKey(p) === state.selectedWorkoutKey && Object.values(p.workouts).some(x => x.dayNumber === dow);
  const isDeload = hasDeload(p) && state.currentWeek === p.deloadWeek;
  const metrics = state.metricsByDate[todayISO()] || { sleep: '', energy: '', soreness: '', bodyweight: '' };
  const stats = getStats();

  let h = '';

  // Program + workout selector
  h += `<div class="card">
    <div class="card-head"><h2>${p.title}</h2><span class="card-hint">${prog.done}/${prog.total} sets</span></div>
    <label class="label">Program</label>
    <select class="prog-select mb-12" id="progSelect">
      ${Object.values(PROGRAMS).map(pr => `<option value="${pr.key}" ${pr.key === state.selectedProgramKey ? 'selected' : ''}>${esc(pr.title)}</option>`).join('')}
    </select>
    ${isDeload ? '<div class="banner banner-warn mb-8">Deload week — volume auto-halved for recovery.</div>' : ''}
    ${!isScheduled ? '<div class="banner banner-info mb-8">Not a scheduled day for this workout — running manually.</div>' : ''}
    <div class="workout-grid">
      ${Object.values(p.workouts).sort((a,b) => (a.dayNumber||0)-(b.dayNumber||0)).map(wo => `
        <button class="wo-btn ${wo.key === state.selectedWorkoutKey ? 'active' : ''}" data-wo="${wo.key}">
          <strong>${wo.name}</strong><span>${wo.day}</span>
        </button>
      `).join('')}
    </div>
  </div>`;

  // Readiness
  h += `<div class="card">
    <div class="card-head"><h2>Readiness</h2><span class="card-hint">Quick check-in</span></div>
    <div class="metrics-row">
      <div class="metric-field"><label>Sleep</label><input type="number" step="0.5" min="0" max="14" id="m_sleep" value="${metrics.sleep||''}" placeholder="hrs" inputmode="decimal" /></div>
      <div class="metric-field"><label>Weight</label><input type="number" step="0.1" min="0" id="m_bw" value="${metrics.bodyweight||''}" placeholder="lbs" inputmode="decimal" /></div>
      <div class="metric-field"><label>Energy</label><input type="number" min="1" max="5" id="m_energy" value="${metrics.energy||''}" placeholder="1-5" inputmode="numeric" /></div>
      <div class="metric-field"><label>Sore</label><input type="number" min="1" max="5" id="m_sore" value="${metrics.soreness||''}" placeholder="1-5" inputmode="numeric" /></div>
    </div>
  </div>`;

  // Stats
  h += `<div class="card">
    <div class="stats-row">
      <div class="stat-cell"><strong>${stats.thisWeek}</strong><span>This wk</span></div>
      <div class="stat-cell"><strong>${stats.sessions}</strong><span>Total</span></div>
      <div class="stat-cell"><strong>${stats.sets}</strong><span>Sets</span></div>
      <div class="stat-cell"><strong>${stats.prCount}</strong><span>PRs</span></div>
    </div>
  </div>`;

  // Exercise cards
  d.exercises.forEach((ex, ei) => {
    const t = template(d.programKey, d.workoutKey, ei);
    const last = lastPerf(ex.actualName, ex.originalName);
    const sug = suggest(ex, t);
    const subs = [ex.originalName, ...(p.substitutions[ex.originalName] || [])];
    const doneSets = ex.sets.filter(s => Number(s.weight) > 0 && Number(s.reps) > 0).length;
    const allDone = doneSets === ex.sets.length;

    h += `<div class="ex-card">
      <div class="ex-top">
        <div class="ex-name">${ex.actualName}</div>
        <div class="ex-badges">
          <span class="badge">${targetSets(t)} × ${t.repsMin}–${t.repsMax}</span>
          <span class="badge">${effortBadge(t)}</span>
          <span class="badge">Rest ${fmtTime(t.rest)}</span>
          <span class="badge ${allDone ? 'badge-done' : ''}">${doneSets}/${ex.sets.length}</span>
        </div>
        ${t.note ? `<div class="ex-note">${t.note}</div>` : ''}
        ${t.intensityHint ? `<div class="ex-note">${t.intensityHint}</div>` : ''}
      </div>

      <select class="ex-sub" data-sub="${ei}">
        ${subs.map(n => `<option value="${esc(n)}" ${n === ex.actualName ? 'selected' : ''}>${n}</option>`).join('')}
      </select>

      <div class="ex-history">
        <strong>${last ? 'Last:' : 'History:'}</strong>
        ${last ? `${last.entry.session.date} · ${setPattern(last.entry.exercise.sets)} · W${last.entry.session.week}` : 'No prior session.'}
        <br><span style="color:var(--text-dim)">${sug.label}${sug.value ? ` → <strong style="color:var(--accent)">${sug.value}</strong>` : ''}</span>
      </div>

      <div class="ex-tools">
        <button class="tool-btn" data-repeat="${ei}">↻ Repeat</button>
        <button class="tool-btn" data-suggest="${ei}">↑ Suggest</button>
        <button class="tool-btn timer-btn" data-rest="${t.rest}" data-rlabel="${esc(ex.actualName)}">⏱ ${fmtTime(t.rest)}</button>
      </div>

      <div class="sets-area">
        ${ex.sets.map((s, si) => {
          const done = Number(s.weight) > 0 && Number(s.reps) > 0;
          return `<div class="set-row ${done ? 'done' : ''}">
            <div class="set-num">${si+1}</div>
            <div class="set-field">
              <label>Weight</label>
              <input type="number" inputmode="decimal" step="0.5" min="0" value="${s.weight}" placeholder="lb" data-sf="${ei}-${si}-weight" />
            </div>
            <div class="set-field">
              <label>Reps</label>
              <input type="number" inputmode="numeric" step="1" min="0" value="${s.reps}" placeholder="${t.repsMin}–${t.repsMax}" data-sf="${ei}-${si}-reps" />
            </div>
            <div class="set-field">
              <label>${effortLabel(t)}</label>
              <input type="number" inputmode="decimal" step="0.5" min="0" max="10" value="${s.rir}" placeholder="${effortPH(t)}" data-sf="${ei}-${si}-rir" />
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });

  // Notes + save
  h += `<div class="card">
    <label class="label">Session notes</label>
    <textarea class="notes-area" id="sessionNotes" placeholder="How did it feel? Cues, pain, wins…">${esc(d.notes||'')}</textarea>
    <div class="action-row">
      <button class="btn-ghost" id="quickExport">Export</button>
      <button class="btn-primary" id="saveBtn">Save workout</button>
    </div>
  </div>`;

  h += '<div class="spacer"></div>';
  return h;
}


/* ─── HISTORY TAB ─── */

function renderHistory() {
  const opts = [...new Set(state.logs.flatMap(s => s.exercises.map(e => e.actualName)))].sort();
  const filter = window.__hf || '';
  const rows = [];
  state.logs.forEach(ses => ses.exercises.forEach(ex => {
    if (filter && ex.actualName !== filter) return;
    const p = PROGRAMS[ses.programKey] || program();
    rows.push({
      name: ex.actualName, orig: ex.originalName,
      workout: p.workouts[ses.workoutKey]?.name || ses.workoutKey,
      prog: p.shortName, date: ses.date, week: ses.week,
      summary: setPattern(ex.sets), vol: Math.round(volume(ex))
    });
  }));
  rows.sort((a,b) => a.date < b.date ? 1 : -1);
  const stats = getStats();

  let h = `<div class="card">
    <div class="stats-row">
      <div class="stat-cell"><strong>${stats.sessions}</strong><span>Sessions</span></div>
      <div class="stat-cell"><strong>${stats.vol.toLocaleString()}</strong><span>Volume</span></div>
      <div class="stat-cell"><strong>${stats.sets}</strong><span>Sets</span></div>
      <div class="stat-cell"><strong>${opts.length}</strong><span>Moves</span></div>
    </div>
  </div>`;

  h += `<div class="card">
    <div class="card-head"><h2>Exercise history</h2></div>
    <label class="label">Filter</label>
    <select class="prog-select mb-12" id="histFilter">
      <option value="">All exercises</option>
      ${opts.map(n => `<option value="${esc(n)}" ${n === filter ? 'selected' : ''}>${n}</option>`).join('')}
    </select>
    ${rows.length ? rows.map(r => `
      <div class="hist-item">
        <div class="hist-top"><span class="hist-name">${r.name}</span><span class="hist-vol">${r.vol.toLocaleString()}</span></div>
        <div class="hist-meta">${r.date} · W${r.week} · ${r.prog} · ${r.workout}</div>
        ${r.name !== r.orig ? `<div class="hist-meta">Subbed from ${r.orig}</div>` : ''}
        <div class="hist-sets">${r.summary}</div>
      </div>
    `).join('') : '<div class="hist-item">No history yet. Save your first workout!</div>'}
  </div>`;

  h += '<div class="spacer"></div>';
  return h;
}


/* ─── REFERENCE TAB ─── */

function renderRef() {
  const p = program();
  let h = `<div class="card">
    <div class="card-head"><h2>Active program</h2></div>
    <label class="label">Program</label>
    <select class="prog-select mb-12" id="refProgSelect">
      ${Object.values(PROGRAMS).map(pr => `<option value="${pr.key}" ${pr.key === state.selectedProgramKey ? 'selected' : ''}>${esc(pr.title)}</option>`).join('')}
    </select>
    <div class="ref-item">
      <strong>Week ${state.currentWeek}</strong> · ${hasDeload(p) ? `Deload on W${p.deloadWeek}` : 'No deload'}
    </div>
  </div>`;

  h += `<div class="card">
    <div class="card-head"><h2>Program rules</h2></div>
    ${p.checklist.map(l => `<div class="ref-item">${l}</div>`).join('')}
  </div>`;

  h += `<div class="card">
    <div class="card-head"><h2>Weekly schedule</h2></div>
    ${Object.values(p.workouts).sort((a,b) => (a.dayNumber||0)-(b.dayNumber||0)).map(w => `
      <div class="ref-item"><strong>${w.day}</strong> — ${w.name}<br><span class="text-dim text-sm">${w.focus}</span></div>
    `).join('')}
    <div class="ref-item"><strong>Recovery</strong><br><span class="text-dim text-sm">${p.recoveryNote || 'Rest days for recovery or make-up sessions.'}</span></div>
  </div>`;

  h += '<div class="spacer"></div>';
  return h;
}


/* ─── SETTINGS TAB ─── */

function renderSettings() {
  let h = `<div class="card">
    <div class="card-head"><h2>Data &amp; backups</h2><span class="card-hint">Local-first</span></div>
    <div class="ref-item mb-12">Everything lives in your browser's local storage. Fast and private, but back up regularly — clearing browser data or low device storage can erase it.</div>
    <div class="action-row mb-12">
      <button class="btn-ghost" id="sExport">Export backup</button>
      <label class="btn-ghost" style="display:flex;align-items:center;justify-content:center;cursor:pointer">
        Import<input type="file" id="sImport" accept="application/json" style="display:none" />
      </label>
    </div>
    <button class="btn-ghost danger" id="sReset">Reset all data</button>
  </div>`;

  h += `<div class="card">
    <div class="card-head"><h2>Profile</h2></div>
    <div class="ref-item mb-12">Current: <strong>${state.profile === 'dad' ? 'Upper / Lower' : state.profile === 'daughter' ? 'Glute Split' : 'Not set'}</strong></div>
    <button class="btn-ghost" id="sProfile">Switch profile</button>
  </div>`;

  h += `<div class="card">
    <div class="card-head"><h2>Tips for iPhone</h2></div>
    <div class="ref-item">Tap the share button in Safari → "Add to Home Screen" to install as an app. It will open full-screen without the browser bar.</div>
    <div class="ref-item">If storage gets low, iOS can purge localStorage. Export a backup after each session to be safe.</div>
  </div>`;

  h += '<div class="spacer"></div>';
  return h;
}


/* ═══════════════════════════════════════════
   EVENT BINDING
   ═══════════════════════════════════════════ */

function bindEvents() {
  const c = document.getElementById('content');

  // Program selector
  const ps = document.getElementById('progSelect') || document.getElementById('refProgSelect');
  if (ps) ps.addEventListener('change', e => {
    state.selectedProgramKey = e.target.value;
    state.selectedWorkoutKey = autoWorkoutKey(program());
    save(); render(); toast('Program changed');
  });

  // Workout buttons
  c.querySelectorAll('[data-wo]').forEach(b => b.addEventListener('click', () => {
    state.selectedWorkoutKey = b.dataset.wo; save(); render();
  }));

  // Substitutions
  c.querySelectorAll('[data-sub]').forEach(sel => sel.addEventListener('change', e => {
    updateName(Number(e.target.dataset.sub), e.target.value); toast('Exercise swapped');
  }));

  // Set fields — UPDATE ONLY DATA on input, NO re-render. Just toggle row class.
  c.querySelectorAll('[data-sf]').forEach(inp => {
    inp.addEventListener('input', e => {
      const [ei, si, field] = e.target.dataset.sf.split('-');
      updateField(Number(ei), Number(si), field, e.target.value);
      // Toggle set-complete styling without re-render
      const row = e.target.closest('.set-row');
      if (row) {
        const inputs = row.querySelectorAll('input');
        const w = Number(inputs[0]?.value || 0), r = Number(inputs[1]?.value || 0);
        row.classList.toggle('done', w > 0 && r > 0);
      }
    });
    // Only re-render on blur to update badges/counts (but preserve focus logic)
    inp.addEventListener('blur', () => {
      // Delay to avoid re-render while user taps next field
      setTimeout(() => {
        if (!document.activeElement || !document.activeElement.dataset.sf) {
          render();
        }
      }, 150);
    });
  });

  // Repeat / suggest
  c.querySelectorAll('[data-repeat]').forEach(b => b.addEventListener('click', () => applyWeight(Number(b.dataset.repeat), 'repeat')));
  c.querySelectorAll('[data-suggest]').forEach(b => b.addEventListener('click', () => applyWeight(Number(b.dataset.suggest), 'suggest')));

  // Timer buttons
  c.querySelectorAll('[data-rest]').forEach(b => b.addEventListener('click', () => startTimer(Number(b.dataset.rest), b.dataset.rlabel || 'Rest')));

  // Metrics
  ['sleep','energy','soreness','bodyweight'].forEach((f, i) => {
    const ids = ['m_sleep','m_energy','m_sore','m_bw'];
    const fields = ['sleep','energy','soreness','bodyweight'];
    const el = document.getElementById(ids[i]);
    if (el) el.addEventListener('input', e => setMetric(fields[i], e.target.value));
  });

  // Notes
  const notes = document.getElementById('sessionNotes');
  if (notes) notes.addEventListener('input', e => updateNotes(e.target.value));

  // Save
  const saveBtn = document.getElementById('saveBtn');
  if (saveBtn) saveBtn.addEventListener('click', saveSession);

  // Quick export
  const qe = document.getElementById('quickExport');
  if (qe) qe.addEventListener('click', exportData);

  // History filter
  const hf = document.getElementById('histFilter');
  if (hf) hf.addEventListener('change', e => { window.__hf = e.target.value; render(); });

  // Settings
  const se = document.getElementById('sExport');
  if (se) se.addEventListener('click', exportData);
  const si = document.getElementById('sImport');
  if (si) si.addEventListener('change', e => { const f = e.target.files?.[0]; if (f) importData(f); });
  const sr = document.getElementById('sReset');
  if (sr) sr.addEventListener('click', resetAll);
  const sp = document.getElementById('sProfile');
  if (sp) sp.addEventListener('click', () => { state.profile = ''; save(); checkProfile(); });
}


/* ═══════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════ */

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  state.activeTab = t.dataset.tab; save(); render();
}));

document.getElementById('weekDown').addEventListener('click', () => { state.currentWeek = clampWeek(state.currentWeek - 1); save(); render(); });
document.getElementById('weekUp').addEventListener('click', () => { state.currentWeek = clampWeek(state.currentWeek + 1); save(); render(); });
document.getElementById('autoBtn').addEventListener('click', () => {
  state.selectedWorkoutKey = autoWorkoutKey(program()); save(); render(); toast('Auto-selected');
});
document.getElementById('todayBtn').addEventListener('click', () => {
  state.activeTab = 'today'; save(); render();
});


/* ═══════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════ */

checkProfile();
ensureWorkout();
render();

</script>
